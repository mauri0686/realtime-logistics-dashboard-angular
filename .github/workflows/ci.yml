name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build backend/LogisticsTracker.Api -c Release

  frontend:
    name: Frontend (Angular 18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests (headless Chrome)
        run: npm test -- --watch=false
      - name: Production build
        run: npm run build
