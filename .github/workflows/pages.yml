name: Deploy live demo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (demo mode activates automatically on github.io)
        run: npx ng build --configuration production --base-href /realtime-logistics-dashboard-angular/
      - name: SPA fallback + no Jekyll
        run: |
          cp dist/frontend-angular/browser/index.html dist/frontend-angular/browser/404.html
          touch dist/frontend-angular/browser/.nojekyll
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend-angular/dist/frontend-angular/browser
